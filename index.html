<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administrador EXSOS - Control Total</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; }
        .admin-container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow-x: auto; margin-bottom: 30px; }
        h1 { color: #152191; text-align: center; margin-bottom: 5px;}
        .subtitulo { text-align:center; color: #555; margin-top: 0; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #152191; color: white; }
        
        .btn-aprobar { background: #00c853; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 5px; width: 100%; transition: 0.2s;}
        .btn-rechazar { background: #ed4245; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s;}
        .btn-inhabilitar { background: #ff9800; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s;}
        
        .buscador-caja { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; align-items: center; background: #eef2f5; padding: 15px; border-radius: 10px; flex-wrap: wrap; }
        .buscador-caja input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; outline: none; font-size: 14px; }
        .btn-buscar { background: #5865f2; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-limpiar { background: #ed4245; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .img-zoom { width: 80px; height: 50px; object-fit: cover; border-radius: 5px; border: 2px solid #ccc; cursor: zoom-in; }
        .img-zoom:hover { transform: scale(1.1); border-color: #152191; }
        .badge-adentro { background: #fff3e0; color: #ff9800; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }
        .badge-completado { background: #e8f5e9; color: #4caf50; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

    <div id="visorImagen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center;">
        <span onclick="document.getElementById('visorImagen').style.display='none'" style="position:absolute; top:20px; right:30px; color:white; font-size:45px; cursor:pointer; font-weight:bold;">&times;</span>
        <img id="imagenAmpliada" src="" style="max-width:90%; max-height:90%; border-radius:10px;">
    </div>

    <div class="admin-container">
        <h1>🛠️ Solicitudes de Registro</h1>
        <table id="tablaUsuarios">
            <thead><tr><th>Usuario</th><th>Contacto</th><th>Vehículo</th><th>Documentos</th><th>Acción</th></tr></thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>

    <div class="admin-container">
        <h1>📋 Bitácora de Accesos en Tiempo Real</h1>
        <p class="subtitulo">Si filtras por hora, verás quiénes estaban dentro en ese momento exacto.</p>
        
        <div class="buscador-caja">
            <label>Fecha:</label>
            <input type="date" id="filtroFecha">

            <label>¿Quién estaba a las?:</label>
            <input type="time" id="filtroHora">

            <button class="btn-buscar" onclick="buscarHistorial()">🔍 Filtrar Bitácora</button>
            <button class="btn-limpiar" onclick="limpiarHistorial()">✖ Ver Recientes</button>
        </div>

        <table id="tablaHistorial">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Placas</th>
                    <th>Entrada</th>
                    <th>Salida</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="cuerpoTablaHistorial"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, doc, updateDoc, query, where, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8LeQ1UNG6XqOpVWAMyde05JOvlWRENvU",
            authDomain: "exsos-login.firebaseapp.com",
            projectId: "exsos-login",
            storageBucket: "exsos-login.firebasestorage.app",
            messagingSenderId: "254157261321",
            appId: "1:254157261321:web:449f88c3567303afa846d8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FUNCIÓN DE BITÁCORA EN TIEMPO REAL CON FILTRO DE RANGO ---
        let desuscribirHistorial = null;

        window.buscarHistorial = function(soloRecientes = false) {
            const tabla = document.getElementById("cuerpoTablaHistorial");
            const fechaFiltro = document.getElementById("filtroFecha").value;
            const horaFiltro = document.getElementById("filtroHora").value;

            // Si ya hay un vigilante activo, lo apagamos para crear uno nuevo
            if (desuscribirHistorial) desuscribirHistorial();

            // Consulta base: Ordenar por lo más nuevo
            let q = query(collection(db, "historial_estacionamiento"), orderBy("timestampEntrada", "desc"));
            
            if (soloRecientes) q = query(q, limit(10));

            // Escuchar cambios EN TIEMPO REAL
            desuscribirHistorial = onSnapshot(q, (snapshot) => {
                tabla.innerHTML = "";
                let contador = 0;

                snapshot.forEach((doc) => {
                    const d = doc.data();
                    
                    // LÓGICA DE FILTRO POR RANGO DE TIEMPO
                    if (!soloRecientes) {
                        // Filtro de Fecha
                        if (fechaFiltro && d.fechaEntrada !== fechaFiltro) return;

                        // Filtro de Hora (Rango: entrada <= filtro < salida)
                        if (horaFiltro) {
                            const horaF = horaFiltro.replace(":", "");
                            const horaE = d.horaEntrada.replace(/:/g, "").substring(0, 4);
                            const horaS = d.horaSalida ? d.horaSalida.replace(/:/g, "").substring(0, 4) : "2359";

                            // Si la hora buscada no está entre la entrada y la salida, ignorar
                            if (!(horaF >= horaE && horaF <= horaS)) return;
                        }
                    }

                    contador++;
                    const salidaTxt = d.horaSalida ? `${d.fechaSalida} - ${d.horaSalida}` : "<b>DENTRO DEL ESTACIONAMIENTO</b>";
                    const estadoBadge = d.horaSalida ? `<span class="badge-completado">FINALIZADO</span>` : `<span class="badge-adentro">EN CURSO</span>`;

                    tabla.innerHTML += `
                        <tr>
                            <td>${d.nombre}</td>
                            <td>${d.placas}</td>
                            <td>${d.fechaEntrada} - ${d.horaEntrada}</td>
                            <td>${salidaTxt}</td>
                            <td>${estadoBadge}</td>
                        </tr>
                    `;
                });

                if (contador === 0) tabla.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Sin resultados para este filtro.</td></tr>";
            });
        };

        window.limpiarHistorial = function() {
            document.getElementById("filtroFecha").value = "";
            document.getElementById("filtroHora").value = "";
            buscarHistorial(true);
        };

        // --- CARGA DE SOLICITUDES ---
        function cargarPendientes() {
            onSnapshot(query(collection(db, "usuarios"), where("estado", "==", "pendiente")), (snap) => {
                const tabla = document.getElementById("cuerpoTabla");
                tabla.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    tabla.innerHTML += `
                        <tr>
                            <td>${d.nombre}</td>
                            <td>${d.correo}</td>
                            <td>${d.modeloAuto} (${d.placas})</td>
                            <td><img src="${d.fotoCarroUrl}" class="img-zoom" onclick="verImagen('${d.fotoCarroUrl}')"></td>
                            <td><button class="btn-aprobar" onclick="cambiarEstado('${doc.id}', 'aprobado')">Aprobar</button></td>
                        </tr>`;
                });
            });
        }

        window.cambiarEstado = async (id, estado) => {
            await updateDoc(doc(db, "usuarios", id), { estado: estado });
        };

        window.verImagen = (url) => {
            document.getElementById('imagenAmpliada').src = url;
            document.getElementById('visorImagen').style.display = 'flex';
        };

        // Iniciar todo
        cargarPendientes();
        buscarHistorial(true);
    </script>
</body>
</html>
