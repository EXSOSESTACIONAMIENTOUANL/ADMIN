<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administrador EXSOS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; }
        .admin-container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow-x: auto; margin-bottom: 30px; }
        h1 { color: #152191; text-align: center; margin-bottom: 5px;}
        .subtitulo { text-align:center; color: #555; margin-top: 0; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #152191; color: white; }
        
        /* Botones */
        .btn-aprobar { background: #00c853; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 5px; width: 100%; transition: 0.2s;}
        .btn-aprobar:hover { background: #009624; }
        .btn-rechazar { background: #ed4245; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s;}
        .btn-rechazar:hover { background: #b82a2d; }
        .btn-inhabilitar { background: #ff9800; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s;}
        .btn-inhabilitar:hover { background: #e68a00; }
        
        /* Fotos */
        .img-zoom {
            width: 80px; 
            height: 50px; 
            object-fit: cover; 
            border-radius: 5px; 
            border: 2px solid #ccc;
            cursor: zoom-in; 
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .img-zoom:hover {
            transform: scale(1.1); 
            border-color: #152191;
        }
        .estado-activo { color: #00c853; font-weight: bold; }
        .estado-inactivo { color: #ed4245; font-weight: bold; }
    </style>
</head>
<body>

    <div id="visorImagen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center;">
        <span onclick="document.getElementById('visorImagen').style.display='none'" style="position:absolute; top:20px; right:30px; color:white; font-size:45px; cursor:pointer; font-weight:bold;">&times;</span>
        <img id="imagenAmpliada" src="" style="max-width:90%; max-height:90%; border-radius:10px; box-shadow:0 0 30px rgba(0,0,0,0.8);">
    </div>

    <div class="admin-container">
        <h1>🛠️ Solicitudes Pendientes</h1>
        <p class="subtitulo">Revisa documentos y datos antes de dar acceso.</p>
        
        <table id="tablaUsuarios">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Contacto</th>
                    <th>Matrícula</th>
                    <th>Vehículo</th>
                    <th>Placas</th>
                    <th>Documentos</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
            </tbody>
        </table>
    </div>

    <div class="admin-container">
        <h1>👥 Usuarios Registrados</h1>
        <p class="subtitulo">Gestiona el acceso de los usuarios que ya pasaron por revisión.</p>
        
        <table id="tablaAprobados">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Contacto</th>
                    <th>Vehículo</th>
                    <th>Placas</th>
                    <th>Estado</th>
                    <th>Documentos</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="cuerpoTablaAprobados">
            </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // NOTA: Asegúrate de que este sea el proyecto correcto (exsos-pruebas o ptueba-1)
        const firebaseConfig = {
            apiKey: "AIzaSyDr2FUS2IBW90alkYnAUUXvMNy2RQPjx6E",
            authDomain: "ptueba-1-78027.firebaseapp.com",
            projectId: "ptueba-1-78027",
            storageBucket: "ptueba-1-78027.firebasestorage.app",
            messagingSenderId: "463811943830",
            appId: "1:463811943830:web:f529bdf1eea53445b0d1b7",
            measurementId: "G-W5TBQT1DLK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.verImagen = function(url) {
            document.getElementById('imagenAmpliada').src = url;
            document.getElementById('visorImagen').style.display = 'flex';
        };

        // CARGAR PENDIENTES
        async function cargarPendientes() {
            const tabla = document.getElementById("cuerpoTabla");
            tabla.innerHTML = "<tr><td colspan='7' style='text-align:center;'>Cargando solicitudes...</td></tr>";
            try {
                const q = query(collection(db, "usuarios"), where("estado", "==", "pendiente"));
                const querySnapshot = await getDocs(q);
                tabla.innerHTML = ""; 
                if (querySnapshot.empty) {
                    tabla.innerHTML = "<tr><td colspan='7' style='text-align:center;'>No hay usuarios pendientes. 🎉</td></tr>";
                    return;
                }
                querySnapshot.forEach((documento) => {
                    const datos = documento.data();
                    const idUsuario = documento.id;
                    const fila = crearFilaPendiente(datos, idUsuario);
                    tabla.innerHTML += fila;
                });
            } catch (error) {
                tabla.innerHTML = "<tr><td colspan='7' style='text-align:center; color:red;'>Error al cargar los datos.</td></tr>";
            }
        }

        // CARGAR APROBADOS E INHABILITADOS
        async function cargarRegistrados() {
            const tabla = document.getElementById("cuerpoTablaAprobados");
            tabla.innerHTML = "<tr><td colspan='7' style='text-align:center;'>Cargando usuarios...</td></tr>";
            try {
                // Traemos a los aprobados y a los inhabilitados
                const q = query(collection(db, "usuarios"), where("estado", "in", ["aprobado", "inhabilitado"]));
                const querySnapshot = await getDocs(q);
                tabla.innerHTML = ""; 
                if (querySnapshot.empty) {
                    tabla.innerHTML = "<tr><td colspan='7' style='text-align:center;'>No hay usuarios registrados.</td></tr>";
                    return;
                }
                querySnapshot.forEach((documento) => {
                    const datos = documento.data();
                    const idUsuario = documento.id;
                    const fila = crearFilaRegistrado(datos, idUsuario);
                    tabla.innerHTML += fila;
                });
            } catch (error) {
                tabla.innerHTML = "<tr><td colspan='7' style='text-align:center; color:red;'>Error al cargar los datos.</td></tr>";
            }
        }

        function crearFilaPendiente(datos, idUsuario) {
            return `
                <tr>
                    <td><strong>${datos.nombre}</strong><br><span style="color:gray; font-size:12px;">Nacimiento: ${datos.fechaNacimiento}</span></td>
                    <td>${datos.correo}<br>${datos.telefono}</td>
                    <td>${datos.matricula || 'N/A'}</td>
                    <td>${datos.modeloAuto} <br> ${datos.colorAuto} (${datos.anioAuto})</td>
                    <td><strong>${datos.placas}</strong></td>
                    <td style="text-align: center;">
                        <img src="${datos.fotoCarroUrl}" class="img-zoom" onclick="verImagen('${datos.fotoCarroUrl}')" title="Ver Carro">
                        <img src="${datos.ineUrl}" class="img-zoom" onclick="verImagen('${datos.ineUrl}')" title="Ver INE">
                    </td>
                    <td>
                        <button class="btn-aprobar" onclick="cambiarEstado('${idUsuario}', 'aprobado')">✅ Aprobar</button>
                        <button class="btn-rechazar" onclick="cambiarEstado('${idUsuario}', 'rechazado')">❌ Rechazar</button>
                    </td>
                </tr>
            `;
        }

        function crearFilaRegistrado(datos, idUsuario) {
            let badgeEstado = "";
            let botonAccion = "";

            if (datos.estado === "aprobado") {
                badgeEstado = "<span class='estado-activo'>ACTIVO</span>";
                botonAccion = `<button class="btn-inhabilitar" onclick="cambiarEstado('${idUsuario}', 'inhabilitado')">🚫 Inhabilitar</button>`;
            } else if (datos.estado === "inhabilitado") {
                badgeEstado = "<span class='estado-inactivo'>INHABILITADO</span>";
                botonAccion = `<button class="btn-aprobar" onclick="cambiarEstado('${idUsuario}', 'aprobado')">✅ Reactivar</button>`;
            }

            return `
                <tr style="background-color: ${datos.estado === 'inhabilitado' ? '#ffebee' : 'transparent'};">
                    <td><strong>${datos.nombre}</strong><br><span style="color:gray; font-size:12px;">Matrícula: ${datos.matricula || 'N/A'}</span></td>
                    <td>${datos.correo}<br>${datos.telefono}</td>
                    <td>${datos.modeloAuto} (${datos.colorAuto})</td>
                    <td><strong>${datos.placas}</strong></td>
                    <td>${badgeEstado}</td>
                    <td style="text-align: center;">
                        <img src="${datos.fotoCarroUrl}" class="img-zoom" onclick="verImagen('${datos.fotoCarroUrl}')" title="Ver Carro">
                        <img src="${datos.ineUrl}" class="img-zoom" onclick="verImagen('${datos.ineUrl}')" title="Ver INE">
                    </td>
                    <td>${botonAccion}</td>
                </tr>
            `;
        }

        // CAMBIAR ESTADO EN FIREBASE
        window.cambiarEstado = async function(id, nuevoEstado) {
            let mensaje = `¿Estás seguro de marcar este usuario como ${nuevoEstado.toUpperCase()}?`;
            if(nuevoEstado === 'inhabilitado') {
                mensaje = "⚠️ ¿INHABILITAR cuenta? El usuario será expulsado inmediatamente y no podrá entrar.";
            }

            if(confirm(mensaje)) {
                try {
                    await updateDoc(doc(db, "usuarios", id), { estado: nuevoEstado });
                    cargarPendientes(); 
                    cargarRegistrados();
                } catch (error) {
                    alert("Error: " + error.message);
                }
            }
        }

        cargarPendientes();
        cargarRegistrados();
    </script>
</body>
</html>
